<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Simples</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <form class="card">

        <h2>Calculadora</h2>

        <input type="text" placeholder="0"><br><br>

        <button onclick="adicionar('7')">7</button>
        <button onclick="adicionar('8')">8</button>
        <button onclick="adicionar('9')">9</button>
        <button class="operador">+</button><br><br>

        <button onclick="adicionar('4')">4</button>
        <button onclick="adicionar('5')">5</button>
        <button type="button">6</button>
        <button class="operador">-</button><br><br>

        <button type="button">1</button>
        <button type="button">2</button>
        <button type="button">3</button>
        <button class="operador">/</button><br><br>

        <button type="button">0</button>
        <button class="limpar">C</button>
        <button class="igual">=</button>
        <button class="operador">*</button><br><br>
    
    </form>
    
</body>
</html>
